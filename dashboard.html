<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBSS OS | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D1B2A;
            --glass-bg: rgba(18, 18, 18, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --accent-blue: #007BFF;
            --accent-lime: #39FF14;
            --accent-orange: #FFA500;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 123, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(57, 255, 20, 0.05), transparent 25%);
            color: var(--text-main);
            margin: 0;
            padding: 0 0 80px 0;
            box-sizing: border-box;
        }

        /* Top Header */
        .top-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-title {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .brand-title span { color: var(--accent-lime); }
        .system-status { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-lime); }

        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease;
        }

        .glass-card:active { transform: scale(0.98); }

        .card-large { grid-column: span 2; }

        .stat-label { font-size: 12px; color: #A0AEC0; margin-bottom: 8px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--text-main); }
        .stat-value.highlight { color: var(--accent-lime); }

        /* Khusus untuk butang aksi cepat */
        .action-btn {
            background: linear-gradient(135deg, var(--accent-blue), #0056b3);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-top: 10px;
        }

        /* Bottom Nav Standard */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(13, 27, 42, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #A0AEC0; text-decoration: none; font-size: 10px; gap: 5px; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="brand-title">dbss<span>&#8599;</span></div>
        <div class="system-status">SYS.ONLINE_</div>
    </header>

    <main class="bento-grid">
        <div class="glass-card card-large">
            <div class="stat-label">Total Projection (RM)</div>
            <div class="stat-value highlight">45,200.00</div>
            <div class="stat-label" style="margin-top:5px; color: var(--accent-blue);">+12% vs last month</div>
        </div>

        <div class="glass-card">
            <div class="stat-label">Active Deploy</div>
            <div class="stat-value">03</div>
        </div>

        <div class="glass-card">
            <div class="stat-label">Quotations</div>
            <div class="stat-value">12</div>
        </div>

        <div class="glass-card card-large">
            <div class="stat-label">System Command</div>
            <div style="color: #A0AEC0; font-size: 14px; margin-bottom: 10px;">Jana sebutharga baru untuk klien.</div>
            <a href="sebutharga.html" class="action-btn">EXECUTE QUOTATION</a>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            Command
        </a>
        <a href="sebutharga.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            Quote
        </a>
        <a href="inventory.html" class="nav-item">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>
            DB_Items
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
            Report
        </a>
    </nav>

</body>
</html>
