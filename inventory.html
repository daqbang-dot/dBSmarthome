<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBSS OS | Inventory Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D1B2A;
            --glass-bg: rgba(18, 18, 18, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-muted: #A0AEC0;
            --accent-blue: #007BFF;
            --accent-lime: #39FF14;
            --accent-orange: #FFA500;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0 0 90px 0;
            box-sizing: border-box;
        }

        .top-header {
            padding: 15px 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-title { font-weight: 700; font-size: 16px; color: var(--accent-lime); letter-spacing: 1px; font-family: 'JetBrains Mono', monospace;}
        
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* Kawalan Carian & Markup Global */
        .control-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 1fr; /* Menegak di telefon */
            gap: 12px;
        }

        /* Susunan melintang untuk skrin sedikit besar */
        @media (min-width: 600px) {
            .control-panel { grid-template-columns: 1fr 1fr 1fr; }
        }

        input, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border); border-radius: 8px;
            color: var(--text-main); box-sizing: border-box; font-family: 'Inter', sans-serif;
        }
        select { color: var(--accent-lime); font-weight: 600; appearance: none;}
        input:focus, select:focus { outline: none; border-color: var(--accent-blue); }

        .markup-label { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-bottom: 5px; display: block;}

        /* Senarai Inventory (Bento Cards) */
        .inventory-list { display: flex; flex-direction: column; gap: 10px; }

        .item-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-left: 3px solid var(--accent-blue);
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .item-details .category { font-size: 10px; color: var(--accent-orange); font-family: 'JetBrains Mono', monospace; }
        .item-details .name { font-size: 13px; font-weight: 600; margin: 5px 0; line-height: 1.4;}
        
        .price-section { text-align: right; font-family: 'JetBrains Mono', monospace; }
        .price-section .cost { font-size: 11px; color: #E53E3E; text-decoration: line-through; }
        .price-section .sell { font-size: 16px; font-weight: 700; color: var(--accent-lime); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(13, 27, 42, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #A0AEC0; text-decoration: none; font-size: 10px; gap: 5px; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="module-title">DB_INVENTORY_</div>
        <div style="font-size: 12px; color: var(--text-muted);">Master Database</div>
    </header>

    <div class="container">
        
        <div class="control-panel">
            <div>
                <span class="markup-label">Kumpulan Sistem</span>
                <select id="groupFilter" onchange="renderInventory()">
                    <option value="ALL">-- PAPAR SEMUA --</option>
                    <option value="DAHUA HDCVI CAMERA">DAHUA HDCVI CAMERA</option>
                    <option value="DAHUA HDCVI RECORDERS">DAHUA HDCVI RECORDERS</option>
                    <option value="DAHUA NETWORK CAMERA">DAHUA NETWORK CAMERA</option>
                    <option value="DAHUA NETWORK RECORDERS">DAHUA NETWORK RECORDERS</option>
                    <option value="OTHERS (DAHUA)">OTHERS (DAHUA)</option>
                    <option value="DAHUA ACCESSORIES">DAHUA ACCESSORIES</option>
                    <option value="REYEE SWITCH">REYEE SWITCH</option>
                    <option value="UNIARCH WIRELESS CAMERA">UNIARCH WIRELESS CAMERA</option>
                    <option value="REYEE GATEWAY">REYEE GATEWAY</option>
                    <option value="VIEWSONIC MONITORS">VIEWSONIC MONITORS</option>
                    <option value="REYEE WIRELESS">REYEE WIRELESS</option>
                    <option value="REYEE HOME WIFI ROUTER">REYEE HOME WIFI ROUTER</option>
                    <option value="ST RACK SERVER RACK">ST RACK SERVER RACK</option>
                    <option value="IMOU WIRELESS CAMERA">IMOU WIRELESS CAMERA</option>
                    <option value="BLUGUARD WIRED ALARM">BLUGUARD WIRED ALARM</option>
                    <option value="BLUGUARD SMART HOME">BLUGUARD SMART HOME</option>
                    <option value="CONTRONETIX OFFLINE & ONLINE UPS">CONTRONETIX UPS</option>
                    <option value="RYSON SOLAR PANEL">RYSON SOLAR PANEL</option>
                    <option value="CABLE & DOOR ACCESS ACCESSORIES">ACCESS & CABLE</option>
                    <option value="DEEP CYCLE BATTERY">DEEP CYCLE BATTERY</option>
                    <option value="DJI DRONE & OTHERS ACCESSORIES">DJI DRONE</option>
                </select>
            </div>
            <div>
                <span class="markup-label">Carian Model / ID</span>
                <input type="text" id="searchInput" placeholder="Cari..." onkeyup="renderInventory()">
            </div>
            <div>
                <span class="markup-label">Auto Markup (%)</span>
                <input type="number" id="markupInput" value="30" onchange="renderInventory()" onkeyup="renderInventory()">
            </div>
        </div>

        <div class="inventory-list" id="inventoryContainer">
            </div>

    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2"></path></svg>
            Command
        </a>
        <a href="sebutharga.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2"></path><polyline points="14 2 14 8 20 8" fill="none" stroke="currentColor" stroke-width="2"></polyline></svg>
            Quote
        </a>
        <a href="inventory.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3" fill="none" stroke="currentColor" stroke-width="2"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" fill="none" stroke="currentColor" stroke-width="2"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" fill="none" stroke="currentColor" stroke-width="2"></path></svg>
            DB_Items
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2" fill="none" stroke="currentColor" stroke-width="2"></path></svg>
            Report
        </a>
    </nav>

    <script src="assets/js/db/db-dahua-camera.js"></script>
    <script src="assets/js/db/db-dahua-recorder.js"></script>
    <script src="assets/js/db/db-dahua-network.js"></script>
    <script src="assets/js/db/db-dahua-network-recorder.js"></script>
    <script src="assets/js/db/db-dahua-accessories.js"></script> <script>
        // Logik Penggabungan (Merge) Master Database
        let dbItems = [];
        try {
            // Semak jika fail JS wujud sebelum gabungkan
            const cams = typeof dahuaCameras !== 'undefined' ? dahuaCameras : [];
            const recs = typeof dahuaRecorders !== 'undefined' ? dahuaRecorders : [];
            const netcams = typeof dahuaNetworkCameras !== 'undefined' ? dahuaNetworkCameras : []; 
            const netrecs = typeof dahuaNetworkRecorders !== 'undefined' ? dahuaNetworkRecorders : []; 
            const accessories = typeof dahuaAccessories !== 'undefined' ? dahuaAccessories : []; // PEMBOLEHUBAH BARU
            
            // GABUNGKAN KESEMUA 5 FAIL PANGKALAN DATA
            dbItems = [...cams, ...recs, ...netcams, ...netrecs, ...accessories];
        } catch (error) {
            console.error("Gagal menggabungkan pangkalan data.", error);
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            const searchQ = document.getElementById('searchInput').value.toLowerCase();
            const groupFilter = document.getElementById('groupFilter').value;
            const markupPercent = parseFloat(document.getElementById('markupInput').value) || 0;
            
            container.innerHTML = ''; 

            if (!dbItems || dbItems.length === 0) {
                container.innerHTML = '<div style="color: var(--accent-orange); text-align: center; padding: 20px; font-family: \'JetBrains Mono\', monospace;">Sistem Mesej: Pangkalan data kosong. Pastikan fail berada dalam folder assets/js/db/</div>';
                return;
            }

            // Filter data berganda: Ikut Kumpulan & Carian Teks
            const filteredData = dbItems.filter(item => {
                const matchSearch = item.name.toLowerCase().includes(searchQ) || item.id.toLowerCase().includes(searchQ);
                const matchGroup = groupFilter === 'ALL' ? true : item.group === groupFilter;
                return matchSearch && matchGroup;
            });

            if (filteredData.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: #A0AEC0; padding: 20px; font-family: 'JetBrains Mono', monospace;">0 ITEMS FOUND</div>`;
                return;
            }

            filteredData.forEach(item => {
                const markupAmount = item.cost * (markupPercent / 100);
                const sellingPrice = item.cost + markupAmount;

                const card = document.createElement('div');
                card.className = 'item-card';
                
                card.innerHTML = `
                    <div class="item-details">
                        <div class="category">[${item.group}]</div>
                        <div class="name">${item.id} - ${item.name}</div>
                    </div>
                    <div class="price-section">
                        <div class="cost">RM ${item.cost.toFixed(2)}</div>
                        <div class="sell">RM ${sellingPrice.toFixed(2)}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = renderInventory;
    </script>
</body>
</html>
