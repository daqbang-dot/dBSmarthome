<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBSS OS | Inventory Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D1B2A;
            --glass-bg: rgba(18, 18, 18, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-muted: #A0AEC0;
            --accent-blue: #007BFF;
            --accent-lime: #39FF14;
            --accent-orange: #FFA500;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0 0 90px 0;
            box-sizing: border-box;
        }

        .top-header {
            padding: 15px 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-title { font-weight: 700; font-size: 16px; color: var(--accent-lime); letter-spacing: 1px; font-family: 'JetBrains Mono', monospace;}
        
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* Kawalan Carian & Markup Global */
        .control-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
        }

        input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border); border-radius: 8px;
            color: var(--text-main); box-sizing: border-box; font-family: 'Inter', sans-serif;
        }
        input:focus { outline: none; border-color: var(--accent-blue); }

        .markup-label { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-bottom: 5px; display: block;}

        /* Senarai Inventory (Bento Cards) */
        .inventory-list { display: flex; flex-direction: column; gap: 10px; }

        .item-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-left: 3px solid #2D3748;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .item-card.cctv { border-left-color: var(--accent-blue); }
        .item-card.alarm { border-left-color: var(--accent-orange); }
        .item-card.autogate { border-left-color: #8A2BE2; }
        .item-card.solar { border-left-color: var(--accent-lime); }

        .item-details .category { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .item-details .name { font-size: 14px; font-weight: 600; margin: 5px 0; }
        
        .price-section { text-align: right; font-family: 'JetBrains Mono', monospace; }
        .price-section .cost { font-size: 11px; color: #E53E3E; text-decoration: line-through; }
        .price-section .sell { font-size: 16px; font-weight: 700; color: var(--accent-lime); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(13, 27, 42, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #A0AEC0; text-decoration: none; font-size: 10px; gap: 5px; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="module-title">DB_INVENTORY_</div>
        <div style="font-size: 12px; color: var(--text-muted);">Data Source: RisingNet (Dahua)</div>
    </header>

    <div class="container">
        
        <div class="control-panel">
            <div>
                <span class="markup-label">Pencarian Pangkalan Data</span>
                <input type="text" id="searchInput" placeholder="Cari model, saiz lens..." onkeyup="renderInventory()">
            </div>
            <div>
                <span class="markup-label">Auto Markup (%)</span>
                <input type="number" id="markupInput" value="30" onchange="renderInventory()" onkeyup="renderInventory()">
            </div>
        </div>

        <div class="inventory-list" id="inventoryContainer">
            </div>

    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="2"></path></svg>
            Command
        </a>
        <a href="sebutharga.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2"></path><polyline points="14 2 14 8 20 8" fill="none" stroke="currentColor" stroke-width="2"></polyline></svg>
            Quote
        </a>
        <a href="inventory.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3" fill="none" stroke="currentColor" stroke-width="2"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" fill="none" stroke="currentColor" stroke-width="2"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" fill="none" stroke="currentColor" stroke-width="2"></path></svg>
            DB_Items
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2" fill="none" stroke="currentColor" stroke-width="2"></path></svg>
            Report
        </a>
    </nav>

    <script src="assets/js/db-risingnet.js"></script>

    <script>
        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            const searchQ = document.getElementById('searchInput').value.toLowerCase();
            const markupPercent = parseFloat(document.getElementById('markupInput').value) || 0;
            
            container.innerHTML = ''; // Kosongkan paparan

            // Semak jika data dbItems wujud (dari fail db-risingnet.js)
            if (typeof dbItems === 'undefined') {
                container.innerHTML = '<div style="color: red; text-align: center; padding: 20px;">Ralat Sistem: Fail db-risingnet.js tidak dijumpai. Sila pastikan fail berada dalam folder assets/js/</div>';
                return;
            }

            // Filter data
            const filteredData = dbItems.filter(item => 
                item.name.toLowerCase().includes(searchQ) || 
                item.id.toLowerCase().includes(searchQ) ||
                item.category.toLowerCase().includes(searchQ)
            );

            filteredData.forEach(item => {
                // Pengiraan
                const markupAmount = item.cost * (markupPercent / 100);
                const sellingPrice = item.cost + markupAmount;

                const card = document.createElement('div');
                card.className = `item-card ${item.category}`;
                
                card.innerHTML = `
                    <div class="item-details">
                        <div class="category">[${item.brand}] ${item.id}</div>
                        <div class="name">${item.name}</div>
                    </div>
                    <div class="price-section">
                        <div class="cost">RM ${item.cost.toFixed(2)}</div>
                        <div class="sell">RM ${sellingPrice.toFixed(2)}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = renderInventory;
    </script>
</body>
</html>
