<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBSS OS | Quotation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0D1B2A;
            --glass-bg: rgba(18, 18, 18, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --accent-blue: #007BFF;
            --accent-lime: #39FF14;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0 0 90px 0;
            box-sizing: border-box;
        }

        .top-header {
            padding: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Glass Form */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2 { margin-top: 0; font-size: 16px; color: var(--accent-blue); letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase;}

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        input:focus { outline: none; border-color: var(--accent-blue); }

        .btn-add {
            width: 100%;
            background: transparent;
            border: 1px dashed var(--accent-lime);
            color: var(--accent-lime);
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-add:active { background: rgba(57, 255, 20, 0.1); }

        /* Respon Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--glass-border); white-space: nowrap; }
        th { color: #A0AEC0; font-weight: normal; }

        .total-display {
            text-align: right;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-lime);
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Bottom Nav (Sama macam Dashboard) */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(13, 27, 42, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #A0AEC0; text-decoration: none; font-size: 10px; gap: 5px; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    </style>
</head>
<body>

    <header class="top-header">
        <div style="font-weight: 700; font-size: 18px; color: var(--accent-lime);">MODULE: QUOTATION</div>
    </header>

    <div class="container">
        <div class="glass-panel">
            <h2>Data Pelanggan</h2>
            <input type="text" placeholder="Nama Klien">
            <input type="text" placeholder="Alamat Tapak / Lokasi">
        </div>

        <div class="glass-panel">
            <h2>Data Sistem</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="itemName" placeholder="Item (cth: Kamera 2MP)" style="flex: 2;">
                <input type="number" id="itemQty" placeholder="Kuantiti" style="flex: 1;">
            </div>
            <input type="number" id="itemPrice" placeholder="Harga Seunit (RM)">
            
            <button class="btn-add" onclick="addItem()">+ INSERT DATA</button>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>RM/Unit</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="itemsBody"></tbody>
                </table>
            </div>

            <div class="total-display">
                TOTAL: RM <span id="grandTotal">0.00</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            Command
        </a>
        <a href="sebutharga.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            Quote
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
            Report
        </a>
    </nav>

    <script>
        let grandTotal = 0;
        function addItem() {
            const name = document.getElementById('itemName').value;
            const qty = parseFloat(document.getElementById('itemQty').value);
            const price = parseFloat(document.getElementById('itemPrice').value);

            if (!name || isNaN(qty) || isNaN(price)) return;

            const total = qty * price;
            grandTotal += total;

            const row = document.getElementById('itemsBody').insertRow();
            row.innerHTML = `
                <td>${name}</td>
                <td>${qty}</td>
                <td>${price.toFixed(2)}</td>
                <td style="color: var(--accent-lime);">${total.toFixed(2)}</td>
            `;

            document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '';
            document.getElementById('itemPrice').value = '';
        }
    </script>
</body>
</html>
