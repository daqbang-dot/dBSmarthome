<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dB Security | Site Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; color: var(--neon-cyan); font-size: 0.85rem; margin-bottom: 5px; font-weight: 600;}
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 10px; border-radius: 6px;
            background: rgba(0,0,0,0.5); color: #fff;
            border: 1px solid var(--text-muted);
            font-family: 'Inter', sans-serif;
        }
        input:focus { border-color: var(--neon-cyan); outline: none; }
        .btn-calc {
            width: 100%; padding: 12px; margin-top: 10px;
            background: rgba(0, 240, 255, 0.2); color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan); border-radius: 6px;
            font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn-calc:hover { background: var(--neon-cyan); color: #000; }
        .quote-result {
            margin-top: 20px; padding: 15px; border-radius: 6px;
            background: rgba(255, 0, 60, 0.1); border: 1px dashed var(--laser-red);
            text-align: left;
        }
        .total-price { font-size: 1.8rem; color: var(--laser-red); font-weight: bold; font-family: 'Rajdhani', sans-serif; text-align: center; margin: 10px 0;}
        .breakdown { font-size: 0.8rem; color: var(--text-muted); font-family: monospace; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; margin-bottom: 10px;}
    </style>
</head>
<body>
    <div class="command-center">
        <header class="top-bar glass-effect">
            <div class="brand">
                <h1>dB<span class="neon-text">ASSESSMENT</span></h1>
                <a href="index.html" style="font-size: 0.75rem; color: var(--text-muted); text-decoration: none; border: 1px solid var(--text-muted); padding: 3px 8px; border-radius: 4px; margin-top: 5px; display: inline-block;">&larr; Balik ke Dashboard</a>
            </div>
            <div class="system-status"><span class="status-text" id="db-status">DB: LOCAL</span><span class="indicator-dot online"></span></div>
        </header>

        <main class="dashboard">
            <section class="panel glass-effect">
                <div class="panel-header">
                    <h2>DATA TAPAK & WIRING</h2>
                    <span class="badge active">STEP 1</span>
                </div>
                <div class="panel-content">
                    <div class="form-group">
                        <label>Nama Pelanggan</label>
                        <input type="text" id="client-name" placeholder="Cth: Kedai Emas ABC">
                    </div>
                    <div class="form-group">
                        <label>No. WhatsApp</label>
                        <input type="number" id="client-phone" placeholder="Cth: 60123456789">
                    </div>
                    <div class="form-group">
                        <label>Status Pendawaian (Wiring)</label>
                        <select id="wiring-status">
                            <option value="ready">Sedia Ada / Surface (+RM0)</option>
                            <option value="conceal">Tanam / Hacking (+Caj Tambahan)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Jenis Siling</label>
                        <select id="ceiling-type">
                            <option value="plaster">Siling Plaster (+RM0)</option>
                            <option value="concrete">Konkrit / Casing (+Caj Tambahan)</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="panel glass-effect">
                <div class="panel-header">
                    <h2>HARDWARE & BOM CCTV</h2>
                    <span class="badge alert">STEP 2</span>
                </div>
                <div class="panel-content">
                    <div class="form-group">
                        <label>Pakej / Jenis Kamera</label>
                        <select id="cctv-type">
                            <option value="cam_analog">Dahua Analog HD 2MP</option>
                            <option value="cam_4mp" selected>Dahua Analog 5MP</option>
                            <option value="cam_colorvu">Dahua ColorVu 2MP</option>
                            <option value="cam_ptz">Dahua PTZ Camera</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Kuantiti Kamera (Unit)</label>
                        <input type="number" id="qty-cctv" value="4" min="0">
                    </div>
                    <div class="form-group">
                        <label>Jenis Decoder (XVR/NVR)</label>
                        <select id="decoder-type">
                            <option value="dec_4ch">4 Channel XVR</option>
                            <option value="dec_8ch">8 Channel XVR</option>
                            <option value="dec_16ch">16 Channel XVR</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Power Supply (Ampere)</label>
                        <select id="psu-type">
                            <option value="psu_5a">5A Adaptor (1-4 Kamera)</option>
                            <option value="psu_10a">10A Metal Box (5-8 Kamera)</option>
                            <option value="psu_20a">20A Metal Box (9-16 Kamera)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Kabel Utama (Per Roll/Kotak)</label>
                        <select id="cable-type">
                            <option value="cab_utp">UTP Cat5e/Cat6 (Guna Balun)</option>
                            <option value="cab_rg59">Coaxial RG59 (Guna BNC)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Jumlah Kabel (Kotak/Roll)</label>
                        <input type="number" id="qty-cable" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>Kualiti Balun (Jika Pilih UTP)</label>
                        <select id="balun-type">
                            <option value="bal_2mp">Balun Standard (2MP)</option>
                            <option value="bal_5mp">Balun High Quality (5MP/8MP)</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="panel glass-effect">
                <div class="panel-header">
                    <h2>ALARM & PENGIRAAN</h2>
                    <span class="badge info">STEP 3</span>
                </div>
                <div class="panel-content">
                    <div class="form-group">
                        <label>Sistem Penggera Pintar</label>
                        <select id="qty-alarm">
                            <option value="0">Tidak Perlu</option>
                            <option value="1">Set Asas (1 Hub, 2 Sensor)</option>
                            <option value="2">Set Penuh (Siren & Pelbagai Sensor)</option>
                        </select>
                    </div>
                    
                    <button class="btn-calc" onclick="calculateQuote()">KIRA & JANA MESEJ</button>

                    <div class="quote-result" id="quote-box" style="display: none;">
                        <p class="data-text">Jumlah Sebut Harga (BOM + Upah):</p>
                        <p class="total-price">RM <span id="total-rm">0.00</span></p>
                        <div class="breakdown" id="bom-breakdown">
                            </div>
                        <button onclick="sendToWhatsApp()" style="width: 100%; padding: 10px; background: #25D366; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">Hantar ke WhatsApp Klien</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { senaraiSupplier, hargaServis, markupKeuntungan } from './pricelist.js';

        let currentTotal = 0;
        let bomText = "";

        // Fungsi mengenakan Markup pada Harga Kos (Dealer Price)
        function kiraHargaJual(hargaKosSupplier) {
            return hargaKosSupplier + (hargaKosSupplier * markupKeuntungan);
        }

        window.calculateQuote = function() {
            // 1. KIRA UPAH & CAJ KERJA (Tanpa Markup)
            let kosUpah = hargaServis.upah_asas; 
            if (document.getElementById('ceiling-type').value === 'concrete') kosUpah += hargaServis.caj_concrete; 
            if (document.getElementById('wiring-status').value === 'conceal') kosUpah += hargaServis.caj_conceal;

            // 2. KIRA HARDWARE UTAMA (Kamera, Decoder, PSU + Markup)
            let qtyCam = parseInt(document.getElementById('qty-cctv').value) || 0;
            let kosKamera = 0, kosDecoder = 0, kosPsu = 0;
            
            if (qtyCam > 0) {
                let idCam = document.getElementById('cctv-type').value;
                kosKamera = qtyCam * kiraHargaJual(senaraiSupplier.kamera[idCam].hargaKos);

                let idDec = document.getElementById('decoder-type').value;
                kosDecoder = kiraHargaJual(senaraiSupplier.decoder[idDec].hargaKos);

                let idPsu = document.getElementById('psu-type').value;
                kosPsu = kiraHargaJual(senaraiSupplier.psu[idPsu].hargaKos);
            }
            
            // 3. KIRA KABEL (+ Markup)
            let qtyKabel = parseInt(document.getElementById('qty-cable').value) || 0;
            let idKabel = document.getElementById('cable-type').value;
            let kosKabel = qtyKabel * kiraHargaJual(senaraiSupplier.kabel[idKabel].hargaKos);

            // 4. KIRA PENYAMBUNG / CONNECTORS (+ Markup)
            let kosPenyambung = 0;
            let detailPenyambung = "";
            let hargaBNC = kiraHargaJual(senaraiSupplier.aksesori.bnc.hargaKos);
            let hargaDC = kiraHargaJual(senaraiSupplier.aksesori.dc_conn.hargaKos);
            
            if (qtyCam > 0) {
                if (idKabel === 'cab_utp') {
                    // Jika UTP: Guna Balun + DC per kamera
                    let idBalun = document.getElementById('balun-type').value;
                    let hargaBalun = kiraHargaJual(senaraiSupplier.aksesori[idBalun].hargaKos);
                    kosPenyambung = qtyCam * (hargaBalun + hargaDC);
                    detailPenyambung = `${qtyCam}x Balun & DC`;
                } else {
                    // Jika RG59: Guna 2 BNC + 1 DC per kamera
                    kosPenyambung = qtyCam * ((hargaBNC * 2) + hargaDC);
                    detailPenyambung = `${qtyCam * 2}x BNC & ${qtyCam}x DC`;
                }
            }

            // 5. KIRA ALARM
            let kosAlarm = 0;
            let valAlarm = parseInt(document.getElementById('qty-alarm').value);
            if (valAlarm === 1) kosAlarm = hargaServis.alarm_basic;
            if (valAlarm === 2) kosAlarm = hargaServis.alarm_pro;

            // JUMLAH KESELURUHAN (UPAH + SEMUA BARANG SELEPAS MARKUP)
            currentTotal = kosUpah + kosKamera + kosDecoder + kosPsu + kosKabel + kosPenyambung + kosAlarm;

            // PAPARAN PECAHAN RESIT (BOM BREAKDOWN) UNTUK ADMIN SAHAJA
            bomText = `
                [+] Upah & Wiring: RM${kosUpah.toFixed(2)}<br>
                [+] ${qtyCam}x Kamera: RM${kosKamera.toFixed(2)}<br>
                [+] 1x Decoder: RM${kosDecoder.toFixed(2)}<br>
                [+] 1x PSU: RM${kosPsu.toFixed(2)}<br>
                [+] ${qtyKabel} Kotak Kabel: RM${kosKabel.toFixed(2)}<br>
                [+] Penyambung (${detailPenyambung}): RM${kosPenyambung.toFixed(2)}<br>
                [+] Alarm: RM${kosAlarm.toFixed(2)}
            `;

            document.getElementById('total-rm').innerText = currentTotal.toFixed(2);
            document.getElementById('bom-breakdown').innerHTML = bomText;
            document.getElementById('quote-box').style.display = 'block';
        };

        window.sendToWhatsApp = function() {
            const name = document.getElementById('client-name').value || "Pelanggan";
            const phone = document.getElementById('client-phone').value;
            const qtyCam = document.getElementById('qty-cctv').value;
            const jenisKabel = document.getElementById('cable-type').options[document.getElementById('cable-type').selectedIndex].text;
            
            // Tarik NAMA SEBENAR model kamera dari pricelist.js
            const idCamSelected = document.getElementById('cctv-type').value;
            const cctvModelName = senaraiSupplier.kamera[idCamSelected].nama;
            
            if (!phone) {
                alert("Sila masukkan No WhatsApp pelanggan dahulu.");
                return;
            }

            // Format Nombor Telefon Antarabangsa (60)
            let formattedPhone = phone.replace(/\D/g, ''); 
            if (formattedPhone.startsWith('0')) formattedPhone = '6' + formattedPhone;

            const message = `Salam Tuan/Puan ${name},\n\nTerima kasih kerana berminat dengan *dB Smarthome & Security*.\n\nBerikut adalah sebut harga rasmi untuk sistem keselamatan premis anda:\n\n📷 *Spesifikasi Sistem:*\n- ${qtyCam} Unit CCTV (${cctvModelName})\n- Decoder/NVR Unit\n- Power Supply Centralized\n- Pendawaian ${jenisKabel}\n- Termasuk Pemasangan & Konfigurasi Online\n\n🛠️ *Jumlah Keseluruhan: RM ${currentTotal.toFixed(2)}*\n\nSila maklumkan jika anda setuju untuk kami teruskan dengan lawatan tapak susulan atau penjadualan pemasangan. Terima kasih!`;

            const waLink = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(message)}`;
            window.open(waLink, '_blank');
        };
    </script>
</body>
</html>
